name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "src/**"
      - "public/**"
      - "package.json"
      - "vite.config.js"
      - "tailwind.config.js"
      - "backend/**"
      - "infra/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pulumi/setup-pulumi@v2

      - name: Get config
        id: config
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi login
          echo "DEPLOY_ROLE_ARN=$(pulumi stack output deploy_role_arn -s flexo333/flexo333-ingress/prod)" >> $GITHUB_OUTPUT
          echo "BUCKET=$(pulumi stack output bucket -s flexo333/flexo333-yt2txt/prod)" >> $GITHUB_OUTPUT
          echo "CF_DISTRIBUTION_ID=$(pulumi stack output distribution_id -s flexo333/flexo333-yt2txt/prod)" >> $GITHUB_OUTPUT
          echo "AWS_REGION=$(pulumi stack output aws_region -s flexo333/flexo333-yt2txt/prod)" >> $GITHUB_OUTPUT
          echo "LAMBDA_URL=$(pulumi stack output api_url -s flexo333/flexo333-yt2txt/prod)" >> $GITHUB_OUTPUT

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.config.outputs.DEPLOY_ROLE_ARN }}
          aws-region: ${{ steps.config.outputs.AWS_REGION }}

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_LAMBDA_URL: ${{ steps.config.outputs.LAMBDA_URL }}
        run: npm run build

      - name: Sync to S3
        env:
          BUCKET: ${{ steps.config.outputs.BUCKET }}
        run: aws s3 sync dist/ s3://$BUCKET --delete

      - name: Invalidate CloudFront
        env:
          CF_DISTRIBUTION_ID: ${{ steps.config.outputs.CF_DISTRIBUTION_ID }}
        run: aws cloudfront create-invalidation --distribution-id $CF_DISTRIBUTION_ID --paths '/*'
